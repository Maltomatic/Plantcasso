<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8" />
    <title>Plant Anomaly Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }

        /* Full-screen cover */
        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Background video */
        #cover-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        /* Overlay text */
        #cover-text {
            position: relative;
            color: #79a352;
            font-size: 2.5rem;
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        #cover-text h1 { font-size: 3rem; margin-bottom: 10px; }
        #cover-text p { font-size: 1.2rem; }

        #enter-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #79a352;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* Dashboard (hidden initially) */
        #dashboard {
            display: none;
            padding: 20px;
        }

        h1 { text-align: center; }

        .chart-container {
            margin: 20px auto;
            max-width: 900px;
        }
    </style>
    <link rel="preload" href="vid.mp4" as="vid.mp4" type="video/mp4">
</head>
<body>
    <!-- Cover screen -->
    <div id="cover">
        <video id="cover-video" autoplay muted loop>
            <source src="vid.mp4" type="video/mp4">
        </video>

        <div id="cover-text">
            <h1>Plant Biosignal Agitation Dashboard</h1>
            <p>Real-time anomaly detection using K-means clustering</p>
            <button id="enter-btn">Enter Dashboard</button>
        </div>
    </div>

    <!-- Main dashboard -->
    <div id="dashboard">
        <h1>Plant Biosignal Dashboard</h1>

        <div class="chart-container">
            <div id="meanStdChart"></div>
            <div id="spikeChart"></div>
            <div id="hjorthChart"></div>
            <div id="clusterChart"></div>
        </div>

        <script>
            const MAX_POINTS = 100;  // keep last 100 windows

            let times = [];
            let means = [];
            let stds = [];
            let spikeCounts = [];
            let hjorths = [];
            let clusterLabels = [];

            const socket = io();

            socket.on("new_data", (data) => {
                // Append new data
                times.push(data.timestamp);
                means.push(data.mean);
                stds.push(data.std);
                spikeCounts.push(data.spike_count);
                hjorths.push(data.hjorth);
                clusterLabels.push(data.cluster);

                // Keep only last MAX_POINTS
                if (times.length > MAX_POINTS) {
                    times = times.slice(times.length - MAX_POINTS);
                    means = means.slice(means.length - MAX_POINTS);
                    stds = stds.slice(stds.length - MAX_POINTS);
                    spikeCounts = spikeCounts.slice(spikeCounts.length - MAX_POINTS);
                    hjorths = hjorths.slice(hjorths.length - MAX_POINTS);
                    clusterLabels = clusterLabels.slice(clusterLabels.length - MAX_POINTS);
                }

                drawCharts();
            });

            function showDashboard() {
                document.getElementById("cover").style.transition = "opacity 1s";
                document.getElementById("cover").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("cover").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                }, 1000);
            }

            function drawCharts() {
                // Mean ± std
                const upper = means.map((m, i) => m + stds[i]);
                const lower = means.map((m, i) => m - stds[i]);

                const meanLine = {
                    x: times,
                    y: means,
                    type: "scatter",
                    mode: "lines",
                    name: "Mean",
                    line: { color: "#2196F3" }
                };

                const stdBand = {
                    x: [...times, ...times.reverse()],
                    y: [...upper, ...lower.reverse()],
                    type: "scatter",
                    fill: "tonexty",
                    name: "Std",
                    line: { color: "rgba(33,150,243,0.2)" },
                    hoverinfo: "none"
                };

                const meanStdLayout = {
                    title: "Mean ± Std (Moving Window)",
                    xaxis: { title: "Time" },
                    yaxis: { title: "Voltage (V)" }
                };

                // Spike count
                const spikeTrace = {
                    x: times,
                    y: spikeCounts,
                    type: "scatter",
                    mode: "lines+markers",
                    name: "Spike Count",
                    line: { color: "#FF5722" }
                };

                const spikeLayout = {
                    title: "Spike Count (Current Window)",
                    xaxis: { title: "Time" },
                    yaxis: { title: "Count" }
                };

                // Hjorth complexity
                const hjorthTrace = {
                    x: times,
                    y: hjorths,
                    type: "scatter",
                    mode: "lines+markers",
                    name: "Hjorth Complexity",
                    line: { color: "#00C853" }
                };

                const hjorthLayout = {
                    title: "Hjorth Complexity",
                    xaxis: { title: "Time" },
                    yaxis: { title: "Complexity" }
                };

                // Cluster labels
                const clusterColors = clusterLabels.map(c =>
                    c === 0 ? "#00C853" :   // stable (green)
                    c === 1 ? "#FF9800" :   // slight agitation (orange)
                    "#FF5252"                // high agitation (red)
                );

                const clusterTrace = {
                    x: times,
                    y: clusterLabels,
                    type: "scatter",
                    mode: "markers",
                    name: "Cluster",
                    marker: { color: clusterColors, size: 8 }
                };

                const clusterLayout = {
                    title: "Current Cluster (0=stable, 1=slight agitation, 2=high agitation)",
                    xaxis: { title: "Time" },
                    yaxis: {
                        title: "Cluster",
                        tickvals: [0, 1, 2],
                        ticktext: ["Stable", "Slight Agitation", "High Agitation"]
                    }
                };

                Plotly.newPlot("meanStdChart", [stdBand, meanLine], meanStdLayout);
                Plotly.newPlot("spikeChart", [spikeTrace], spikeLayout);
                Plotly.newPlot("hjorthChart", [hjorthTrace], hjorthLayout);
                Plotly.newPlot("clusterChart", [clusterTrace], clusterLayout);
            }

            document.getElementById("enter-btn").addEventListener("click", showDashboard);
        </script>
    </div>
</body>
</html>
